name: Publish TestPyPI

on:
  release:
    types: [prereleased]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-distributions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Build and validate distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v5
        with:
          name: python-dist
          path: dist/*

  publish-to-testpypi:
    runs-on: ubuntu-latest
    needs: build-distributions
    environment:
      name: testpypi
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v5
        with:
          name: python-dist
          path: dist/

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/

  verify-testpypi-install:
    runs-on: ubuntu-latest
    needs: publish-to-testpypi

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Smoke-install published version from TestPyPI
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(python - <<'PY'
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          print(data["project"]["version"])
          PY
          )

          for i in {1..10}; do
            if python -m pip install --no-cache-dir \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              "speech-rt-optimization==${VERSION}"; then
              break
            fi
            if [ "$i" -eq 10 ]; then
              echo "Package was not available on TestPyPI after retries."
              exit 1
            fi
            sleep 15
          done

          python - <<'PY'
          import importlib.metadata as md

          print("Installed version:", md.version("speech-rt-optimization"))
          PY
