name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with black
        run: black --check src tests scripts

      - name: Sort-check imports
        run: isort --check-only src tests scripts

      - name: Lint with flake8
        run: flake8 src tests scripts

      - name: Run tests with coverage
        run: coverage run -m pytest && coverage report -m

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t speech-rt-optimization:ci .
