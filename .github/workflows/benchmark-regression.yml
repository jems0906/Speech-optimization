name: Benchmark Regression Gate

on:
  workflow_dispatch:
    inputs:
      history_json:
        description: Path to benchmark history JSON in repo
        required: false
        default: artifacts/benchmark_history.json
        type: string
      baseline_index:
        description: Baseline run index
        required: false
        default: "-2"
        type: string
      candidate_index:
        description: Candidate run index
        required: false
        default: "-1"
        type: string
      max_p95_regression_pct:
        description: Max allowed p95 regression percent
        required: false
        default: "5"
        type: string
      max_peak_mem_regression_pct:
        description: Max allowed peak memory regression percent
        required: false
        default: "10"
        type: string
      fail_on_regression:
        description: Fail workflow when thresholds are exceeded
        required: false
        default: true
        type: boolean
  pull_request:
    paths:
      - artifacts/benchmark_history.json
      - scripts/compare_benchmark_history.py
      - .github/workflows/benchmark-regression.yml

permissions:
  contents: read
  pull-requests: write

jobs:
  compare:
    runs-on: ubuntu-latest
    outputs:
      benchmark_passed: ${{ steps.parse_status.outputs.passed }}
      benchmark_severity: ${{ steps.parse_status.outputs.severity }}
      benchmark_triage: ${{ steps.parse_status.outputs.triage }}
      benchmark_severity_rank: ${{ steps.parse_status.outputs.severity_rank }}
      benchmark_p95_exceeded: ${{ steps.parse_status.outputs.p95_exceeded }}
      benchmark_peak_mem_exceeded: ${{ steps.parse_status.outputs.peak_mem_exceeded }}
    env:
      HISTORY_JSON: ${{ github.event.inputs.history_json || 'artifacts/benchmark_history.json' }}
      BASELINE_INDEX: ${{ github.event.inputs.baseline_index || '-2' }}
      CANDIDATE_INDEX: ${{ github.event.inputs.candidate_index || '-1' }}
      MAX_P95: ${{ github.event.inputs.max_p95_regression_pct || '5' }}
      MAX_PEAK_MEM: ${{ github.event.inputs.max_peak_mem_regression_pct || '10' }}
      FAIL_ON_REGRESSION: ${{ github.event.inputs.fail_on_regression || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate history file
        shell: bash
        run: |
          if [ -f "$HISTORY_JSON" ]; then
            echo "Using benchmark history: $HISTORY_JSON"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "::error::History file not found: $HISTORY_JSON"
            exit 1
          fi

          echo "::notice::No benchmark history found at $HISTORY_JSON; skipping comparison for this PR."
          exit 0

      - name: Compare benchmark runs
        id: compare_run
        if: ${{ hashFiles(env.HISTORY_JSON) != '' }}
        continue-on-error: true
        shell: bash
        run: |
          CMD=(
            python scripts/compare_benchmark_history.py "$HISTORY_JSON"
            --baseline-index "$BASELINE_INDEX"
            --candidate-index "$CANDIDATE_INDEX"
            --max-p95-regression-pct "$MAX_P95"
            --max-peak-mem-regression-pct "$MAX_PEAK_MEM"
            --output-json artifacts/benchmark_comparison.json
          )

          if [ "$FAIL_ON_REGRESSION" = "true" ]; then
            CMD+=(--fail-on-regression)
          fi

          echo "Running: ${CMD[*]}"
          set +e
          "${CMD[@]}" | tee artifacts/benchmark_compare_stdout.txt
          code=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

      - name: Parse benchmark status lines
        id: parse_status
        if: ${{ hashFiles('artifacts/benchmark_compare_stdout.txt') != '' }}
        shell: bash
        run: |
          status_file="artifacts/benchmark_compare_stdout.txt"

          get_value() {
            local key="$1"
            grep -E "^${key}=" "$status_file" | tail -n 1 | cut -d= -f2-
          }

          echo "passed=$(get_value BENCHMARK_PASSED)" >> "$GITHUB_OUTPUT"
          echo "severity=$(get_value BENCHMARK_SEVERITY)" >> "$GITHUB_OUTPUT"
          echo "triage=$(get_value BENCHMARK_TRIAGE)" >> "$GITHUB_OUTPUT"
          echo "severity_rank=$(get_value BENCHMARK_SEVERITY_RANK)" >> "$GITHUB_OUTPUT"
          echo "p95_exceeded=$(get_value BENCHMARK_P95_EXCEEDED)" >> "$GITHUB_OUTPUT"
          echo "peak_mem_exceeded=$(get_value BENCHMARK_PEAK_MEM_EXCEEDED)" >> "$GITHUB_OUTPUT"

      - name: Build markdown regression summary
        if: ${{ hashFiles('artifacts/benchmark_comparison.json') != '' }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          json_path = Path("artifacts/benchmark_comparison.json")
          payload = json.loads(json_path.read_text(encoding="utf-8"))
          rows = payload.get("rows", [])
          summary = payload.get("summary", {})
          triage = str(summary.get("severity_label", "UNKNOWN"))

          lines = [
              f"## [{triage}] Benchmark Regression Summary",
              "",
              f"- Passed: **{summary.get('passed', False)}**",
              f"- Severity: **{str(summary.get('severity', 'n/a')).upper()}**",
              f"- Triage: **{summary.get('severity_label', 'n/a')}**",
              f"- Worst p95 regression: **{summary.get('worst_p95_regression_pct', 'n/a')}%**",
              f"- Worst peak memory regression: **{summary.get('worst_peak_mem_regression_pct', 'n/a')}%**",
              "",
              "| Variant | dP95 (ms) | dP95 (%) | dPeakMem (MB) | dPeakMem (%) |",
              "|---|---:|---:|---:|---:|",
          ]

          for row in rows:
              lines.append(
                  "| "
                  f"{row.get('variant', 'n/a')} | "
                  f"{row.get('delta_p95_ms', 0)} | "
                  f"{row.get('delta_p95_ms_pct', 0)} | "
                  f"{row.get('delta_peak_gpu_mb', 0)} | "
                  f"{row.get('delta_peak_gpu_mb_pct', 0)} |"
              )

          markdown = "\n".join(lines) + "\n"
          md_path = Path("artifacts/benchmark_comparison.md")
          md_path.write_text(markdown, encoding="utf-8")

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a", encoding="utf-8") as f:
                  f.write(markdown)
          PY

      - name: Comment benchmark summary on PR
        if: ${{ github.event_name == 'pull_request' && hashFiles('artifacts/benchmark_comparison.md') != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const marker = '<!-- benchmark-regression-comment -->';
            const mdPath = path.join(
              process.env.GITHUB_WORKSPACE,
              'artifacts',
              'benchmark_comparison.md'
            );

            const md = fs.readFileSync(mdPath, 'utf8');
            const body = `${marker}\n${md}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find(c =>
              typeof c.body === 'string' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing benchmark comment: ${existing.id}`);
            } else {
              const created = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info(`Created benchmark comment: ${created.data.id}`);
            }

      - name: Upload comparison artifact
        if: ${{ hashFiles('artifacts/benchmark_comparison.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-comparison
          path: |
            artifacts/benchmark_comparison.json
            artifacts/benchmark_comparison.md
            artifacts/benchmark_compare_stdout.txt

      - name: Enforce benchmark regression gate
        if: ${{ steps.compare_run.outputs.exit_code != '' && steps.compare_run.outputs.exit_code != '0' }}
        shell: bash
        run: |
          code="${{ steps.compare_run.outputs.exit_code }}"
          echo "Benchmark comparison exit code: $code"
          if [ "$code" = "2" ]; then
            echo "::error::Benchmark regression gate failed."
            exit 2
          fi
          echo "::error::Benchmark comparison failed with exit code $code"
          exit "$code"

  notify-regression:
    needs: compare
    runs-on: ubuntu-latest
    if: ${{ always() && needs.compare.outputs.benchmark_severity_rank == '2' }}
    steps:
      - name: Emit medium-severity summary
        shell: bash
        run: |
          severity="${{ needs.compare.outputs.benchmark_severity }}"
          triage="${{ needs.compare.outputs.benchmark_triage }}"
          passed="${{ needs.compare.outputs.benchmark_passed }}"
          p95_exceeded="${{ needs.compare.outputs.benchmark_p95_exceeded }}"
          peak_mem_exceeded="${{ needs.compare.outputs.benchmark_peak_mem_exceeded }}"

          echo "::warning::Medium benchmark regression detected (triage=${triage}, severity=${severity})."

          {
            echo "## Benchmark Regression Notice"
            echo
            echo "- Triage: **${triage}**"
            echo "- Severity: **${severity}**"
            echo "- Passed: **${passed}**"
            echo "- p95 threshold exceeded: **${p95_exceeded}**"
            echo "- peak memory threshold exceeded: **${peak_mem_exceeded}**"
            echo
            echo "Action: review the sticky PR benchmark comment and decide whether the regression is acceptable."
          } >> "$GITHUB_STEP_SUMMARY"

  blocker-escalation:
    needs: compare
    runs-on: ubuntu-latest
    if: ${{ always() && needs.compare.outputs.benchmark_severity_rank != '' && fromJSON(needs.compare.outputs.benchmark_severity_rank) >= 3 }}
    steps:
      - name: Create blocker summary artifact
        shell: bash
        run: |
          severity="${{ needs.compare.outputs.benchmark_severity }}"
          triage="${{ needs.compare.outputs.benchmark_triage }}"
          passed="${{ needs.compare.outputs.benchmark_passed }}"
          p95_exceeded="${{ needs.compare.outputs.benchmark_p95_exceeded }}"
          peak_mem_exceeded="${{ needs.compare.outputs.benchmark_peak_mem_exceeded }}"

          mkdir -p artifacts

          {
            echo "# Benchmark Blocker Escalation"
            echo
            echo "- Triage: **${triage}**"
            echo "- Severity: **${severity}**"
            echo "- Passed: **${passed}**"
            echo "- p95 threshold exceeded: **${p95_exceeded}**"
            echo "- peak memory threshold exceeded: **${peak_mem_exceeded}**"
            echo
            echo "Action: treat this PR as blocked until the benchmark regression is explained or fixed."
          } > artifacts/benchmark_blocker_summary.md

          echo "::error::High severity benchmark regression detected (triage=${triage}, severity=${severity})."
          cat artifacts/benchmark_blocker_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload blocker artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-blocker-summary
          path: artifacts/benchmark_blocker_summary.md
