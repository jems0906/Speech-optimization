services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${PORT:-8000}:8000"
    environment:
      ASR_BACKEND: ${ASR_BACKEND:-transformers}
      ASR_MODEL_ID: ${ASR_MODEL_ID:-openai/whisper-small}
      ASR_DEVICE: ${ASR_DEVICE:-cpu}
      ASR_DTYPE: ${ASR_DTYPE:-float32}
      ENABLE_TORCH_COMPILE: ${ENABLE_TORCH_COMPILE:-false}
      ENABLE_DYNAMIC_INT8: ${ENABLE_DYNAMIC_INT8:-false}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
